name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.12.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.2.20

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Build binaries
        run: ./scripts/build-binaries.sh

      - name: Generate SHA256SUMS for release artifacts
        # WS11: installers/install.sh verifies tarball checksums against this
        # file. Generated from inside the binaries dir so paths are flat.
        run: |
          cd packages/coding-agent/binaries
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum cave-darwin-arm64.tar.gz cave-darwin-x64.tar.gz \
                     cave-linux-x64.tar.gz cave-linux-arm64.tar.gz \
                     cave-windows-x64.zip > SHA256SUMS
          else
            shasum -a 256 cave-darwin-arm64.tar.gz cave-darwin-x64.tar.gz \
                          cave-linux-x64.tar.gz cave-linux-arm64.tar.gz \
                          cave-windows-x64.zip > SHA256SUMS
          fi
          cat SHA256SUMS

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${RELEASE_TAG#v}"
          cd packages/coding-agent
          awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release ${VERSION}" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/coding-agent/binaries
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes-file /tmp/release-notes.md \
            cave-darwin-arm64.tar.gz \
            cave-darwin-x64.tar.gz \
            cave-linux-x64.tar.gz \
            cave-linux-arm64.tar.gz \
            cave-windows-x64.zip \
            SHA256SUMS \
            2>/dev/null || \
          gh release upload "${RELEASE_TAG}" \
            cave-darwin-arm64.tar.gz \
            cave-darwin-x64.tar.gz \
            cave-linux-x64.tar.gz \
            cave-linux-arm64.tar.gz \
            cave-windows-x64.zip \
            SHA256SUMS \
            --clobber

      - name: Upload artifacts for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: cave-archives
          path: |
            packages/coding-agent/binaries/cave-darwin-arm64.tar.gz
            packages/coding-agent/binaries/cave-darwin-x64.tar.gz
            packages/coding-agent/binaries/cave-linux-x64.tar.gz
            packages/coding-agent/binaries/cave-linux-arm64.tar.gz
            packages/coding-agent/binaries/cave-windows-x64.zip
          retention-days: 7

  publish-npm:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm publish --workspaces --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Download cave-archives
        uses: actions/download-artifact@v4
        with:
          name: cave-archives
          path: archives
      - name: Extract linux-x64 tarball into docker-rootfs/
        run: |
          mkdir -p docker-rootfs
          tar -xzf archives/cave-linux-x64.tar.gz --strip-components=1 -C docker-rootfs
          test -x docker-rootfs/cave
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.RELEASE_TAG }}
            ghcr.io/${{ github.repository }}:latest

  update-homebrew:
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # HOMEBREW_BUMP_TOKEN is an optional PAT; falls back to GITHUB_TOKEN when absent.
          # If `main` is branch-protected against Actions pushes, set HOMEBREW_BUMP_TOKEN.
          token: ${{ secrets.HOMEBREW_BUMP_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Download cave-archives
        uses: actions/download-artifact@v4
        with:
          name: cave-archives
          path: archives
      - name: Rewrite Formula/cave.rb
        run: ./scripts/update-homebrew.sh "${RELEASE_TAG}" archives
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git diff --quiet Formula/cave.rb; then
            echo "Formula unchanged — nothing to commit"
            exit 0
          fi
          git add Formula/cave.rb
          git commit -m "chore(homebrew): bump formula to ${RELEASE_TAG}"
          git push origin HEAD:main

  smoke-install:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triple: linux-x64
          - os: macos-latest
            triple: darwin-arm64
          - os: windows-latest
            triple: windows-x64
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Download cave-archives
        uses: actions/download-artifact@v4
        with:
          name: cave-archives
          path: archives
      - name: Serve archives locally
        shell: bash
        run: |
          cd archives
          python3 -m http.server 8000 >/tmp/http.log 2>&1 &
          echo $! > /tmp/http.pid
          sleep 2
      - name: Run unix installer
        if: matrix.triple != 'windows-x64'
        shell: bash
        env:
          CAVE_VERSION: ${{ env.RELEASE_TAG }}
          CAVE_BASE_URL: http://localhost:8000
          CAVE_PREFIX: ${{ runner.temp }}/cave-smoke
        run: |
          bash install.sh
          "$CAVE_PREFIX/bin/cave" --version
      - name: Run windows installer
        if: matrix.triple == 'windows-x64'
        shell: pwsh
        env:
          CAVE_VERSION: ${{ env.RELEASE_TAG }}
          CAVE_BASE_URL: http://localhost:8000
          CAVE_PREFIX: ${{ runner.temp }}\cave-smoke
        run: |
          pwsh -File install.ps1
          & "$env:CAVE_PREFIX\bin\cave.cmd" --version
      - name: Stop http server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/http.pid ]; then kill "$(cat /tmp/http.pid)" 2>/dev/null || true; fi
